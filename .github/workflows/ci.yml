name: Parabank CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression
          - ui
          - api
          - hybrid

      execution_mode:
        description: "Execution mode"
        required: true
        default: "single"
        type: choice
        options:
          - single
          - matrix

      browser:
        description: "Single browser (used only when execution_mode = single)"
        required: true
        default: "chrome"
        type: choice
        options:
          - chrome
          - firefox
          - edge

      browser_matrix:
        description: "Browser matrix set (used only when execution_mode = matrix)"
        required: true
        default: "chrome-firefox"
        type: choice
        options:
          - chrome-only
          - firefox-only
          - edge-only
          - chrome-firefox
          - chrome-edge
          - firefox-edge
          - chrome-firefox-edge

      remote_provider:
        description: "Execution backend"
        required: true
        default: "local"
        type: choice
        options:
          - local
          - selenium-grid
          - browserstack

      selenium_remote_url:
        description: "Selenium Grid URL"
        required: false
        default: "http://localhost:4444"

      browserstack_os:
        description: "BrowserStack OS"
        required: true
        default: "Windows"
        type: choice
        options:
          - Windows
          - OS X

      browserstack_os_version:
        description: "BrowserStack OS version"
        required: true
        default: "11"
        type: choice
        options:
          - "11"
          - "10"
          - Sonoma
          - Sequoia

      browserstack_browser_version:
        description: "BrowserStack browser version"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - latest-1
          - latest-2

      env:
        description: "Environment"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - stage
          - dev

      retry_count:
        description: "Retry count"
        required: true
        default: "2"
        type: choice
        options:
          - "0"
          - "1"
          - "2"
          - "3"

      thread_count:
        description: "Thread count"
        required: true
        default: "5"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"
          - "6"
          - "7"
          - "8"
          - "10"

      data_provider_thread_count:
        description: "Data provider thread count"
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"

      parallel_mode:
        description: "Parallel mode"
        required: true
        default: "methods"
        type: choice
        options:
          - none
          - methods
          - classes
          - tests
          - instances

      headless:
        description: "Run in headless mode"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: read

concurrency:
  group: parabank-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare execution config
    runs-on: ubuntu-latest

    outputs:
      suite: ${{ steps.config.outputs.suite }}
      runner_class: ${{ steps.config.outputs.runner_class }}
      test_env: ${{ steps.config.outputs.test_env }}
      retry_count: ${{ steps.config.outputs.retry_count }}
      thread_count: ${{ steps.config.outputs.thread_count }}
      data_provider_thread_count: ${{ steps.config.outputs.data_provider_thread_count }}
      parallel_mode: ${{ steps.config.outputs.parallel_mode }}
      headless: ${{ steps.config.outputs.headless }}
      execution_mode: ${{ steps.config.outputs.execution_mode }}
      browsers_json: ${{ steps.config.outputs.browsers_json }}
      remote_provider: ${{ steps.config.outputs.remote_provider }}
      selenium_remote_url: ${{ steps.config.outputs.selenium_remote_url }}
      browserstack_os: ${{ steps.config.outputs.browserstack_os }}
      browserstack_os_version: ${{ steps.config.outputs.browserstack_os_version }}
      browserstack_browser_version: ${{ steps.config.outputs.browserstack_browser_version }}

    steps:
      - name: Determine suite configuration
        id: config
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            SUITE="regression"
            EXECUTION_MODE="matrix"
            BROWSER_MATRIX="chrome-firefox"
            REMOTE_PROVIDER="local"
            SELENIUM_REMOTE_URL="http://localhost:4444"
            BROWSERSTACK_OS="Windows"
            BROWSERSTACK_OS_VERSION="11"
            BROWSERSTACK_BROWSER_VERSION="latest"
            TEST_ENV="qa"
            RETRY_COUNT="2"
            THREAD_COUNT="5"
            DATA_PROVIDER_THREAD_COUNT="2"
            PARALLEL_MODE="methods"
            HEADLESS="true"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SUITE="${{ github.event.inputs.suite }}"
            EXECUTION_MODE="${{ github.event.inputs.execution_mode }}"
            SINGLE_BROWSER="${{ github.event.inputs.browser }}"
            BROWSER_MATRIX="${{ github.event.inputs.browser_matrix }}"
            REMOTE_PROVIDER="${{ github.event.inputs.remote_provider }}"
            SELENIUM_REMOTE_URL="${{ github.event.inputs.selenium_remote_url }}"
            BROWSERSTACK_OS="${{ github.event.inputs.browserstack_os }}"
            BROWSERSTACK_OS_VERSION="${{ github.event.inputs.browserstack_os_version }}"
            BROWSERSTACK_BROWSER_VERSION="${{ github.event.inputs.browserstack_browser_version }}"
            TEST_ENV="${{ github.event.inputs.env }}"
            RETRY_COUNT="${{ github.event.inputs.retry_count }}"
            THREAD_COUNT="${{ github.event.inputs.thread_count }}"
            DATA_PROVIDER_THREAD_COUNT="${{ github.event.inputs.data_provider_thread_count }}"
            PARALLEL_MODE="${{ github.event.inputs.parallel_mode }}"
            HEADLESS="${{ github.event.inputs.headless }}"
          else
            SUITE="smoke"
            EXECUTION_MODE="matrix"
            BROWSER_MATRIX="chrome-firefox"
            REMOTE_PROVIDER="local"
            SELENIUM_REMOTE_URL="http://localhost:4444"
            BROWSERSTACK_OS="Windows"
            BROWSERSTACK_OS_VERSION="11"
            BROWSERSTACK_BROWSER_VERSION="latest"
            TEST_ENV="qa"
            RETRY_COUNT="2"
            THREAD_COUNT="5"
            DATA_PROVIDER_THREAD_COUNT="2"
            PARALLEL_MODE="methods"
            HEADLESS="true"
          fi

          case "$SUITE" in
            smoke) RUNNER_CLASS="com.parabank.automation.runners.SmokeTestRunner" ;;
            regression) RUNNER_CLASS="com.parabank.automation.runners.RegressionTestRunner" ;;
            ui) RUNNER_CLASS="com.parabank.automation.runners.UiTestRunner" ;;
            api) RUNNER_CLASS="com.parabank.automation.runners.ApiTestRunner" ;;
            hybrid) RUNNER_CLASS="com.parabank.automation.runners.HybridTestRunner" ;;
            *) echo "Unsupported suite: $SUITE"; exit 1 ;;
          esac

          if [[ "$EXECUTION_MODE" == "single" ]]; then
            BROWSERS_JSON="[\"${SINGLE_BROWSER:-chrome}\"]"
          else
            case "$BROWSER_MATRIX" in
              chrome-only) BROWSERS_JSON='["chrome"]' ;;
              firefox-only) BROWSERS_JSON='["firefox"]' ;;
              edge-only) BROWSERS_JSON='["edge"]' ;;
              chrome-firefox) BROWSERS_JSON='["chrome","firefox"]' ;;
              chrome-edge) BROWSERS_JSON='["chrome","edge"]' ;;
              firefox-edge) BROWSERS_JSON='["firefox","edge"]' ;;
              chrome-firefox-edge) BROWSERS_JSON='["chrome","firefox","edge"]' ;;
              *) echo "Unsupported browser matrix"; exit 1 ;;
            esac
          fi

          echo "suite=$SUITE" >> "$GITHUB_OUTPUT"
          echo "runner_class=$RUNNER_CLASS" >> "$GITHUB_OUTPUT"
          echo "test_env=$TEST_ENV" >> "$GITHUB_OUTPUT"
          echo "retry_count=$RETRY_COUNT" >> "$GITHUB_OUTPUT"
          echo "thread_count=$THREAD_COUNT" >> "$GITHUB_OUTPUT"
          echo "data_provider_thread_count=$DATA_PROVIDER_THREAD_COUNT" >> "$GITHUB_OUTPUT"
          echo "parallel_mode=$PARALLEL_MODE" >> "$GITHUB_OUTPUT"
          echo "headless=$HEADLESS" >> "$GITHUB_OUTPUT"
          echo "execution_mode=$EXECUTION_MODE" >> "$GITHUB_OUTPUT"
          echo "browsers_json=$BROWSERS_JSON" >> "$GITHUB_OUTPUT"
          echo "remote_provider=$REMOTE_PROVIDER" >> "$GITHUB_OUTPUT"
          echo "selenium_remote_url=$SELENIUM_REMOTE_URL" >> "$GITHUB_OUTPUT"
          echo "browserstack_os=$BROWSERSTACK_OS" >> "$GITHUB_OUTPUT"
          echo "browserstack_os_version=$BROWSERSTACK_OS_VERSION" >> "$GITHUB_OUTPUT"
          echo "browserstack_browser_version=$BROWSERSTACK_BROWSER_VERSION" >> "$GITHUB_OUTPUT"

  # --- test + reporting jobs remain SAME as your current working version ---